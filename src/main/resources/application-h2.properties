# ============================================================
# Profil H2 — développement uniquement
# ATTENTION : ne jamais activer spring.h2.console.enabled=true
#             en production (accès direct à la base sans auth).
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/games;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 : dev uniquement, accès local uniquement
spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=false
