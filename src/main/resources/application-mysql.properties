# ============================================================
# Profil MySQL — NE JAMAIS committer de credentials en clair
# Définir avant de lancer : export DB_USERNAME=... DB_PASSWORD=...
# ============================================================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/games?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
